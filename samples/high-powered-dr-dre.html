<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>High Powered - Dr. Dre | EMDb</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* make links match surrounding text, and red on hover */
    .sample-page a { color: inherit; text-decoration: none; }
    .sample-page a:hover, .sample-page a:focus { color: #E21C21; outline: none; }
    /* inline sample players: desktop side-by-side, mobile stacked */

      cursor: pointer;
    }
    .sample-title span { display: inline-block; padding-right: 24px; transition: transform 0.3s ease; }
    @media (max-width: 640px) {
      .sample-meta { flex-direction: column; align-items: flex-start; gap: 12px; }
      .sample-details { width: 100%; }
      .sample-videos { display:flex; flex-direction:column; align-items:stretch; gap:30px; margin-top:16px; flex-wrap:nowrap; }
      .sample-inline-video { width:100%; max-width:100%; flex:0 0 auto; transform:none; margin-top:0; }
      .sample-title { white-space: normal; }
      .sample-inline-video + .sample-inline-video {
        border-top: 1px solid rgba(255,255,255,0.12);
        padding-top: 30px;
      }
    }
  </style>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

     crossorigin="anonymous"></script>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="sample-page" style="max-width:900px;margin:2rem auto;color:#ddd;background:#151515;padding:1.5rem;border-radius:6px;border:1px solid #222;">
      <h3 style="color:#fff;margin:0 0 0.75rem 0;">Interpolation: Lyrics • Vocals</h3>
      <div class="sample-videos">
        <div class="sample-inline-video">
          <div class="sample-title" data-reveal="true"><span>High Powered - Dr. Dre</span></div>
          <div style="width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;border-radius:4px;">
            <iframe id="sampleVideo" style="width:100%;height:100%;border:0;display:block;" src="https://www.youtube.com/embed/CvgIRHhyRQE?rel=0&modestbranding=1&enablejsapi=1" title="High Powered - Dr. Dre" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div style="color:#ccc;font-size:0.95rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px;">
            <span style="font-size:0.95rem;">@ 1:14</span>
            <button id="seekSampleBtn1a" style="background:#E21C21;color:#fff;border:0;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:0.85rem;">Jump</button>
            <span style="font-size:0.95rem;">@ 1:22</span>
            <button id="seekSampleBtn1b" style="background:#E21C21;color:#fff;border:0;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:0.85rem;">Jump</button>
            <span style="font-size:0.95rem;">@ 2:08</span>
            <button id="seekSampleBtn1c" style="background:#E21C21;color:#fff;border:0;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:0.85rem;">Jump</button>
          </div>
        </div>
        <div class="sample-inline-video">
          <div class="sample-title"><a href="/songs/marshall-mathers-lp/remember-me.html">Remember Me? - Eminem</a></div>
          <div style="width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;border-radius:4px;">
            <iframe id="sampleVideo2" style="width:100%;height:100%;border:0;display:block;" src="https://www.youtube.com/embed/CyuJdoePF0Y?rel=0&modestbranding=1&enablejsapi=1" title="Remember Me? - Eminem" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div style="color:#ccc;font-size:0.95rem;display:flex;gap:8px;align-items:center;margin-top:6px;">
            <span style="font-size:0.95rem;">@ 0:23</span>
            <button id="seekSampleBtn2" style="background:#E21C21;color:#fff;border:0;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:0.85rem;">Jump</button>

    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/header.js"></script>
  <script>
    var samplePlayer1, samplePlayer2;
    function onYouTubeIframeAPIReady(){
      function onPlayerStateChange(e){
        if (!window.YT || typeof YT.PlayerState === 'undefined') return;
        if (e.data !== YT.PlayerState.PLAYING) return;
        if (e.target === samplePlayer1 && samplePlayer2 && typeof samplePlayer2.pauseVideo === 'function') {
          samplePlayer2.pauseVideo();
        }
        if (e.target === samplePlayer2 && samplePlayer1 && typeof samplePlayer1.pauseVideo === 'function') {
          samplePlayer1.pauseVideo();
        }
      }
      try{
        samplePlayer1 = new YT.Player('sampleVideo', { events: { onStateChange: onPlayerStateChange } });
      }catch(e){}
      try{
        samplePlayer2 = new YT.Player('sampleVideo2', { events: { onStateChange: onPlayerStateChange } });
      }catch(e){}
    }
    (function loadYT(){
      if(window.YT && window.YT.Player){ return onYouTubeIframeAPIReady(); }
      var tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api';
      var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(tag, s);
    })();
    document.addEventListener('DOMContentLoaded', function(){
      var btn1a = document.getElementById('seekSampleBtn1a');
      var btn1b = document.getElementById('seekSampleBtn1b');
      var btn1c = document.getElementById('seekSampleBtn1c');
      var btn2 = document.getElementById('seekSampleBtn2');
      var revealTitles = document.querySelectorAll('.sample-title[data-reveal="true"]');
      function jumpTo(player, iframeId, seconds){
        if(window.YT && player && typeof player.seekTo === 'function'){
          player.seekTo(seconds, true);
          if(typeof player.playVideo === 'function') player.playVideo();
        } else {
          var iframe = document.getElementById(iframeId);
          if(iframe && iframe.contentWindow){
            try{ iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'seekTo', args: [seconds, true] }), '*'); }catch(e){}
          }
        }
      }
      revealTitles.forEach(function(title){
        var t = null;
        title.addEventListener('click', function(){
          var span = title.querySelector('span');
          if (!span) return;
          if (t) { clearTimeout(t); }
          span.style.transform = 'translateX(0)';
          var overflow = span.scrollWidth - title.clientWidth;
          if (overflow > 0) {
            span.style.transform = 'translateX(-' + overflow + 'px)';
            t = setTimeout(function(){
              span.style.transform = 'translateX(0)';
              t = null;
            }, 1600);
          }
        });
      });
      if(btn1a){
        btn1a.addEventListener('click', function(){
          jumpTo(samplePlayer1, 'sampleVideo', 74);
          btn1a.blur();
        }, false);
      }
      if(btn1b){
        btn1b.addEventListener('click', function(){
          jumpTo(samplePlayer1, 'sampleVideo', 82);
          btn1b.blur();
        }, false);
      }
      if(btn1c){
        btn1c.addEventListener('click', function(){
          jumpTo(samplePlayer1, 'sampleVideo', 128);
          btn1c.blur();
        }, false);
      }
      if(btn2){
        btn2.addEventListener('click', function(){
          jumpTo(samplePlayer2, 'sampleVideo2', 23);
          btn2.blur();
        }, false);
      }
    });
  </script>
</body>
