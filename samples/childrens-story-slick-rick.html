<body>

    <div class="sample-page" style="max-width:900px;margin:2rem auto;color:#ddd;background:#151515;padding:1.5rem;border-radius:6px;border:1px solid #222;">

  <script src="/header.js"></script>
  <script>
    var samplePlayer1, samplePlayer2;
    function onYouTubeIframeAPIReady(){
      function onPlayerStateChange(e){
        if (!window.YT || typeof YT.PlayerState === 'undefined') return;
        if (e.data !== YT.PlayerState.PLAYING) return;
        if (e.target === samplePlayer1 && samplePlayer2 && typeof samplePlayer2.pauseVideo === 'function') {
          samplePlayer2.pauseVideo();
        }
        if (e.target === samplePlayer2 && samplePlayer1 && typeof samplePlayer1.pauseVideo === 'function') {
          samplePlayer1.pauseVideo();
        }
      }
      try{
        samplePlayer1 = new YT.Player('sampleVideo', { events: { onStateChange: onPlayerStateChange } });
      }catch(e){}
      try{
        samplePlayer2 = new YT.Player('sampleVideo2', { events: { onStateChange: onPlayerStateChange } });
      }catch(e){}
    }
    (function loadYT(){
      if(window.YT && window.YT.Player){ return onYouTubeIframeAPIReady(); }
      var tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api';
      var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(tag, s);
    })();
    document.addEventListener('DOMContentLoaded', function(){
      var btn1 = document.getElementById('seekSampleBtn');
      var btn2 = document.getElementById('seekSampleBtn2');
      var revealTitles = document.querySelectorAll('.sample-title[data-reveal="true"]');
      revealTitles.forEach(function(title){
        var t = null;
        title.addEventListener('click', function(){
          var span = title.querySelector('span');
          if (!span) return;
          if (t) { clearTimeout(t); }
          span.style.transform = 'translateX(0)';
          var overflow = span.scrollWidth - title.clientWidth;
          if (overflow > 0) {
            span.style.transform = 'translateX(-' + overflow + 'px)';
            t = setTimeout(function(){
              span.style.transform = 'translateX(0)';
              t = null;
            }, 1600);
          }
        });
      });
      if(btn1){
        btn1.addEventListener('click', function(){
          if(window.YT && samplePlayer1 && typeof samplePlayer1.seekTo === 'function'){
            samplePlayer1.seekTo(156, true);
            if(typeof samplePlayer1.playVideo === 'function') samplePlayer1.playVideo();
          } else {
            var iframe = document.getElementById('sampleVideo');
            if(iframe && iframe.contentWindow){
              try{ iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'seekTo', args: [216, true] }), '*'); }catch(e){}
            }
          }
          btn1.blur();
        }, false);
      }
      if(btn2){
        btn2.addEventListener('click', function(){
          if(window.YT && samplePlayer2 && typeof samplePlayer2.seekTo === 'function'){
            samplePlayer2.seekTo(98, true);
            if(typeof samplePlayer2.playVideo === 'function') samplePlayer2.playVideo();
          } else {
            var iframe = document.getElementById('sampleVideo2');
            if(iframe && iframe.contentWindow){
              try{ iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'seekTo', args: [99, true] }), '*'); }catch(e){}
            }
          }
          btn2.blur();
        }, false);
      }
    });
  </script>
