<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Awards | EMDb</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #eaeaea;
      font-family: Arial, Helvetica, sans-serif;
    }

    .awards-page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 1rem;
      box-sizing: border-box;
    }

    .page-title {
      font-size: clamp(26px, 4vw, 36px);
      margin: 0 0 0.5rem;
      color: #fff;
    }

    .page-subtitle {
      margin: 0 0 1.2rem;
      color: #aaa;
      font-size: 14px;
      line-height: 1.45;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 10px;
      background: #151515;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .filter-group label {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #aaa;
    }

    .filter-group select,
    .filter-group button {
      height: 36px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111;
      color: #eaeaea;
      padding: 0 10px;
      font-size: 14px;
    }

    .filter-group select:focus-visible,
    .filter-group button:focus-visible {
      outline: 2px solid rgba(226, 28, 33, 0.35);
      outline-offset: 2px;
    }

    #clearFiltersBtn {
      cursor: pointer;
      border-color: #e21c21;
      color: #e21c21;
      background: transparent;
      transition: background-color 0.14s ease, color 0.14s ease;
    }

    #clearFiltersBtn:hover {
      background: #e21c21;
      color: #fff;
    }

    .results-meta {
      margin: 0 0 10px;
      color: #aaa;
      font-size: 13px;
    }

    .table-shell {
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      background: #101010;
    }

    .awards-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .awards-table thead th {
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #aaa;
      background: #141414;
      border-bottom: 1px solid #242424;
      padding: 10px;
    }

    .awards-table tbody td {
      padding: 10px;
      border-bottom: 1px solid #1f1f1f;
      font-size: 14px;
      line-height: 1.4;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    .awards-table tbody tr:hover {
      background: rgba(226, 28, 33, 0.05);
    }

    .year-cell {
      width: 88px;
      color: #ddd;
      white-space: nowrap;
    }

    .award-cell {
      width: 230px;
      color: #fff;
      font-weight: 600;
    }

    .work-cell {
      color: #eaeaea;
    }

    .work-cell a {
      color: inherit;
      text-decoration: none;
    }

    .work-cell a:hover,
    .work-cell a:focus-visible {
      color: #e21c21;
      text-decoration: none;
    }

    .category-cell {
      width: 290px;
      color: #bdbdbd;
    }

    .anchor-offset {
      display: block;
      position: relative;
      top: -90px;
      visibility: hidden;
      height: 0;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 20px;
      border-top: 1px solid #1f1f1f;
    }

    @media (max-width: 980px) {
      .filters {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .table-shell {
        overflow: visible;
        border: none;
        background: transparent;
      }

      .awards-table,
      .awards-table tbody,
      .awards-table tr,
      .awards-table td {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }

      .awards-table thead {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .awards-table tbody tr {
        background: #101010;
        border: 1px solid #222;
        border-radius: 8px;
        margin: 0 0 10px;
        padding: 6px 0;
      }

      .awards-table tbody td {
        border-bottom: 1px solid #1f1f1f;
        padding: 8px 10px 8px 132px;
        min-height: 34px;
        position: relative;
      }

      .awards-table tbody td:last-child {
        border-bottom: none;
      }

      .awards-table tbody td::before {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        top: 8px;
        width: 112px;
        color: #aaa;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .year-cell,
      .award-cell,
      .category-cell {
        width: auto;
      }
    }
  </style>
</head>

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function slugify(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/['"]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '');
    }

    function sortKeyIgnoreLeadingThe(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/^["'“”‘’\s]+/, '')
        .replace(/^the\s+/, '');
    }

    function compareAlphaIgnoreLeadingThe(a, b) {
      const aKey = sortKeyIgnoreLeadingThe(a);
      const bKey = sortKeyIgnoreLeadingThe(b);
      return aKey.localeCompare(bKey) || String(a).localeCompare(String(b));
    }

    function toCurlyTypography(value) {
      let text = String(value || '');
      // Opening/closing double quotes around phrases.
      text = text.replace(/"([^"]*)"/g, '“$1”');
      // Apostrophes between letters, e.g. World's, Devil's.
      text = text.replace(/([A-Za-z])'([A-Za-z])/g, '$1’$2');
      return text;
    }

    function getWorkFilterLabel(work) {
      // Keep filter compact by stripping descriptive parenthetical contributor blocks.
      return String(work || '').replace(/\s*\([^)]*\)\s*$/, '').trim();

    function isAlbumWork(work) {
      return albumWorks.has(String(work || '').trim());
    }

    function compareWorkFilterValues(a, b) {
      const aArtistLast = artistLastWorks.has(a);
      const bArtistLast = artistLastWorks.has(b);
      if (aArtistLast && !bArtistLast) return 1;
      if (!aArtistLast && bArtistLast) return -1;
      return compareAlphaIgnoreLeadingThe(getWorkFilterLabel(a), getWorkFilterLabel(b));
    }

    function parseAwards(text) {
      const lines = String(text || '')
        .split('\n')
        .map((line) => line.trim())
        .filter(Boolean)
        .filter((line) => !/^\[(\d+)\](\[(\d+)\])*$/.test(line));

      const records = [];
      for (let i = 0; i < lines.length; i += 4) {
        const award = lines[i] || '';
        const year = lines[i + 1] || '';
        const work = lines[i + 2] || '';
        const category = lines[i + 3] || '';
        if (!award || !year || !work || !category) continue;
        records.push({
          award,
          year,
          work,
          category
        });
      }
      return records;
    }

      if (excludeKey !== 'award' && selected.award && item.award !== selected.award) return false;
      if (excludeKey !== 'work' && selected.work && item.work !== selected.work) return false;
      if (excludeKey !== 'year' && selected.year && item.year !== selected.year) return false;
      return true;
    }

    function resetSelectWithDefault(selectEl) {
      const defaults = {
        awardFilter: 'All awards',
        workFilter: 'All recipients / works',
        yearFilter: 'All years'
      };
      const id = selectEl.id;
      const label = defaults[id] || 'All';
      selectEl.innerHTML = `<option value="">${label}</option>`;
    }

    function populateSingleFilter(selectEl, key, selected) {
      const values = Array.from(new Set(
        allAwards
          .filter((item) => passesFilters(item, selected, key))
          .map((item) => item[key])
      ));

      if (key === 'year') {
        values.sort((a, b) => Number(a) - Number(b));
      } else if (key === 'work') {
        values.sort(compareWorkFilterValues);
      } else {
        values.sort(compareAlphaIgnoreLeadingThe);
      }

      resetSelectWithDefault(selectEl);

      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        if (key === 'work') {
          option.textContent = toCurlyTypography(getWorkFilterLabel(value));
          if (isAlbumWork(value)) option.style.fontStyle = 'italic';
        } else {
          option.textContent = toCurlyTypography(value);
        }
        selectEl.appendChild(option);
      });

      const currentValue = selected[key] || '';
      if (currentValue && values.includes(currentValue)) {
        selectEl.value = currentValue;
      } else {
        selectEl.value = '';
      }
    }

    function refreshFilterOptions() {
      const selected = getSelectedFilters();
      populateSingleFilter(awardFilter, 'award', selected);
      populateSingleFilter(workFilter, 'work', selected);
      populateSingleFilter(yearFilter, 'year', selected);
    }

    function getFilteredAwards() {
      const award = awardFilter.value;
      const work = workFilter.value;
      const year = yearFilter.value;

      const filtered = allAwards.filter((item) => {
        if (award && item.award !== award) return false;
        if (work && item.work !== work) return false;
        if (year && item.year !== year) return false;
        return true;
      });

      const allFiltersReset = !award && !work && !year;
      if (!allFiltersReset) return filtered;

      return filtered.slice().sort((a, b) => (
        Number(a.year) - Number(b.year)
        || compareAlphaIgnoreLeadingThe(a.award, b.award)
        || compareAlphaIgnoreLeadingThe(a.category, b.category)
        || compareAlphaIgnoreLeadingThe(a.work, b.work)
      ));
    }

    function renderAwards() {
      const filtered = getFilteredAwards();
      const firstWorkAnchorSeen = new Set();

      awardsTbody.innerHTML = filtered.map((item, idx) => {
        const workSlug = slugify(item.work);
        const awardSlug = slugify(item.award);
        const rowAnchor = `award-${item.year}-${workSlug}-${awardSlug}-${idx + 1}`;
        const firstWorkAnchor = `recipient-work-${workSlug}`;
        const includeFirstWorkAnchor = !firstWorkAnchorSeen.has(firstWorkAnchor);
        if (includeFirstWorkAnchor) firstWorkAnchorSeen.add(firstWorkAnchor);

        return `
          <tr>
            <td class="year-cell" data-label="Year">${escapeHtml(item.year)}</td>
            <td class="award-cell" data-label="Award">${escapeHtml(toCurlyTypography(item.award))}</td>
            <td class="work-cell" data-label="Recipient / Work">
              <span class="anchor-offset" id="${escapeHtml(rowAnchor)}"></span>
              ${includeFirstWorkAnchor ? `<span class="anchor-offset" id="${escapeHtml(firstWorkAnchor)}"></span>` : ''}
              ${(() => {
                const formattedWork = isAlbumWork(item.work)
                  ? `<em>${escapeHtml(toCurlyTypography(item.work))}</em>`
                  : escapeHtml(toCurlyTypography(item.work));
                const href = workLinks.get(item.work);
                return href ? `<a href="${escapeHtml(href)}">${formattedWork}</a>` : formattedWork;
              })()}
            </td>
            <td class="category-cell" data-label="Category">${escapeHtml(toCurlyTypography(item.category))}</td>
          </tr>
        `;
      }).join('');

      emptyState.hidden = filtered.length !== 0;
      resultsMeta.textContent = `${filtered.length} award entr${filtered.length === 1 ? 'y' : 'ies'} shown (${allAwards.length} total)`;
    }

    const handleFilterChange = () => {
      refreshFilterOptions();
      renderAwards();
    };

    awardFilter.addEventListener('change', handleFilterChange);
    workFilter.addEventListener('change', handleFilterChange);
    yearFilter.addEventListener('change', handleFilterChange);

    clearFiltersBtn.addEventListener('click', () => {
      awardFilter.value = '';
      workFilter.value = '';
      yearFilter.value = '';
      refreshFilterOptions();
      renderAwards();
    });

    refreshFilterOptions();
    renderAwards();
  </script>

  <script src="/header.js"></script>
</body>
</html>
