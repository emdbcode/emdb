<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eminem on X | EMDb</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .emx-page {
      max-width: 620px;
      margin: 40px auto 80px;
      padding: 0 20px;
    }
    .emx-page h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 20px;
    }
    .emx-timeline-wrap {
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      overflow: hidden;
      min-height: 600px;
    }

    .emx-fallback {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }

    .emx-file-warning {
      margin: 10px 0 0;
      font-size: 13px;
      color: #ffb3b3;
      display: none;
    }

    .emx-fallback a {
      color: #ddd;
      text-decoration: underline;
    }

    .emx-fallback a:hover,
    .emx-fallback a:focus {
      color: #E21C21;
    }
  </style>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="emx-page">
      <h1>Eminem on X</h1>
      <div class="emx-timeline-wrap">
        <a
          class="twitter-timeline"
          data-theme="dark"
          data-dnt="true"
          href="https://x.com/eminemdb?ref_src=twsrc%5Etfw"
        >Posts by EMDb</a>
        <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
      </div>
      <p class="emx-file-warning" id="emxFileWarning">X embeds do not load from file:// previews. Open this page through your site or localhost.</p>
      <p class="emx-fallback">If the embed does not load, open <a href="https://x.com/eminemdb" target="_blank" rel="noopener noreferrer">@eminemdb on X</a>.</p>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="/header.js"></script>
  <script>
    (() => {
      const fileWarning = document.getElementById('emxFileWarning');
      if (fileWarning && location.protocol === 'file:') {
        fileWarning.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
