<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eminem on X | EMDb</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .emx-page {
      max-width: 620px;
      margin: 40px auto 80px;
      padding: 0 20px;
    }
    .emx-page h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 20px;
    }
    .emx-timeline-wrap {
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      overflow: hidden;
      min-height: 600px;
    }

    .emx-fallback {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }

    .emx-fallback a {
      color: #ddd;
      text-decoration: underline;
    }

    .emx-fallback a:hover,
    .emx-fallback a:focus {
      color: #E21C21;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="emx-page">
      <h1>Eminem on X</h1>
      <div class="emx-timeline-wrap">
        <a
          class="twitter-timeline"
          data-theme="dark"
          data-dnt="true"
          href="https://x.com/Eminem?ref_src=twsrc%5Etfw"
        >Posts by Eminem</a>
      </div>
      <p class="emx-fallback">If the embed does not load, open <a href="https://x.com/Eminem" target="_blank" rel="noopener noreferrer">@Eminem on X</a>.</p>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="/header.js"></script>
  <script>
    (() => {
      const mount = document.querySelector('.emx-timeline-wrap');
      if (!mount) return;

      const loadWidgets = () => {
        if (window.twttr && window.twttr.widgets && typeof window.twttr.widgets.load === 'function') {
          window.twttr.widgets.load(mount);
          return;
        }

        const existing = document.querySelector('script[data-x-widgets]');
        if (existing) return;

        const script = document.createElement('script');
        script.async = true;
        script.charset = 'utf-8';
        script.src = 'https://platform.x.com/widgets.js';
        script.setAttribute('data-x-widgets', 'true');
        script.onload = () => {
          if (window.twttr && window.twttr.widgets && typeof window.twttr.widgets.load === 'function') {
            window.twttr.widgets.load(mount);
          }
        };
        document.body.appendChild(script);
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadWidgets, { once: true });
      } else {
        loadWidgets();
      }
    })();
  </script>
</body>
</html>
