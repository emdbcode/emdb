<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marshall Matters: Eminem Articles | EMDb</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #eaeaea;
      font-family: Arial, Helvetica, sans-serif;
    }

    .articles-page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem 2rem;
      box-sizing: border-box;
    }

    .articles-shell {
      background: #151515;
      border: 1px solid #222;
      border-radius: 6px;
      padding: clamp(1rem, 2.5vw, 1.5rem);
    }

    .articles-shell h1 {
      margin: 0 0 1rem 0;
      color: #fff;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.25;
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .article-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .article-card a {
      color: inherit;
      text-decoration: none !important;
      display: grid;
      grid-template-rows: auto auto;
      height: 100%;
    }

    .article-card a:link,
    .article-card a:visited,
    .article-card a:hover,
    .article-card a:focus,
    .article-card a:focus-visible {
      text-decoration: none !important;
    }

    .article-card:hover,
    .article-card:focus-within {
      border-color: #E21C21;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      transform: translateY(-1px);
    }

    .article-card img {
      width: 100%;
      display: block;
      border-bottom: 1px solid #222;
      transition: transform 0.9s ease-out;
      will-change: transform;
    }

    .article-card:hover img,
    .article-card:focus-within img {
      transform: scale(1.04);
    }

    .article-card h2 {
      margin: 0;
      padding: 0.9rem 1rem;
      color: #fff;
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.35;
      text-decoration: none !important;
    }

    @media (max-width: 900px) {
      .articles-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .articles-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

     crossorigin="anonymous"></script>
</head>
<body>
  <div id="site-header"></div>

  <main class="articles-page">
    <section class="articles-shell">
      <h1>Eminem Articles</h1>

      <div class="articles-grid">
        <article class="article-card">
          <a href="/articles/5-album-theory.html">
            <img src="/images/article-images/5-album-theory-small.jpg" alt="Does This Pattern in Eminem's Discography Tell Us What's Next?">
            <h2>Does This Pattern in Eminem’s Discography Tell Us What’s Next?</h2>
          </a>
        </article>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="/header.js"></script>
</body>
</html>
